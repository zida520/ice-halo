<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖配送时间预测</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 50px auto; padding: 20px; background-color: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 180px; font-weight: bold; }
        input, select { width: 250px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; text-align: center; font-size: 20px; font-weight: bold; }
        .error { color: red; }
        .note { font-size: 12px; color: gray; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>外卖配送时间预测</h1>
    <form id="predictionForm">
        <div class="form-group">
            <label>交通状况 (Traffic_Level):</label>
            <select name="Traffic_Level" required>
                <option value="">请选择</option>
                <option value="High">High</option>
                <option value="Low">Low</option>
                <option value="Moderate">Moderate</option>
                <option value="Very High">Very High</option>
                <option value="Very Low">Very Low</option>
            </select>
        </div>
        <div class="form-group">
            <label>天气描述 (weather_description):</label>
            <select name="weather_description" required>
                <option value="">请选择</option>
                <option value="mist">mist</option>
                <option value="clear sky">clear sky</option>
                <option value="overcast clouds">overcast clouds</option>
                <option value="broken clouds">broken clouds</option>
                <option value="haze">haze</option>
                <option value="scattered clouds">scattered clouds</option>
                <option value="fog">fog</option>
                <option value="smoke">smoke</option>
                <option value="few clouds">few clouds</option>
                <option value="light rain">light rain</option>
                <option value="moderate rain">moderate rain</option>
            </select>
        </div>
        <div class="form-group">
            <label>订单类型 (Type_of_order):</label>
            <select name="Type_of_order" required>
                <option value="">请选择</option>
                <option value="Snack">Snack</option>
                <option value="Meal">Meal</option>
                <option value="Drinks">Drinks</option>
                <option value="Buffet">Buffet</option>
            </select>
        </div>
        <div class="form-group">
            <label>交通工具 (Type_of_vehicle):</label>
            <select name="Type_of_vehicle" required>
                <option value="">请选择</option>
                <option value="scooter">scooter</option>
                <option value="motorcycle">motorcycle</option>
                <option value="electric_scooter">electric_scooter</option>
                <option value="bicycle">bicycle</option>
            </select>
        </div>
        <div class="form-group">
            <label>配送员年龄 (Delivery_person_Age):</label>
            <input type="number" step="1" name="Delivery_person_Age" required>
        </div>
        <div class="form-group">
            <label>配送员评分 (Delivery_person_Ratings):</label>
            <input type="number" step="0.1" name="Delivery_person_Ratings" required>
        </div>
        <div class="form-group">
            <label>温度 (°C):</label>
            <input type="number" step="any" name="temperature" required>
        </div>
        <div class="form-group">
            <label>配送距离 (km):</label>
            <input type="number" step="any" name="Distance (km)" required>
        </div>
        <button type="submit">预测配送时间</button>
    </form>
    <div id="result" class="result" style="display:none;"></div>
    <div class="note">请选择/填写正确的值，确保与训练数据一致。</div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {};
        for (let [key, value] of formData.entries()) {
            if (key === 'Delivery_person_Age' || key === 'temperature' || key === 'Distance (km)') {
                data[key] = parseFloat(value);
            } else if (key === 'Delivery_person_Ratings') {
                data[key] = parseFloat(value);
            } else {
                data[key] = value;
            }
        }
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '预测中，请稍候...';
        resultDiv.classList.remove('error');
        try {
            const response = await fetch('http://localhost:5000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const result = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `预测配送时间：<span style="color:#007bff;">${result.predicted_minutes}</span> 分钟`;
            } else {
                resultDiv.innerHTML = `错误：${result.error}`;
                resultDiv.classList.add('error');
            }
        } catch (error) {
            resultDiv.innerHTML = `请求失败：${error.message}`;
            resultDiv.classList.add('error');
        }
    });
</script>
</body>
</html>
